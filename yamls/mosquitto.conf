# mosquitto.conf - CargoService Sprint 2
# Two listeners on the SAME broker:
#   1883  native MQTT (TCP)        -> board, qak application, simulated devices
#   9001  MQTT over WebSocket      -> the web GUI (browsers cannot open raw MQTT/TCP)
# Anonymous access is enabled for the demo (no auth).

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true
