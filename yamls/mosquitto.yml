##mosquitto.yml  -  CargoService Sprint 2
## Broker with TWO listeners: 1883 native MQTT + 9001 MQTT-over-WebSocket.
## The WebSocket listener requires the mounted mosquitto.conf (below): on
## mosquitto 1.6.x exposing the port alone is NOT enough.

services:

  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: mosquittoalone
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"     # native MQTT (board, qak application, simulated devices)
      - "9001:9001"     # MQTT over WebSocket (web GUI)

